<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1A2B 動態對戰版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="../firebase.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 15px; }
        .game-card { background: #2d2d2d; border-radius: 15px; padding: 20px; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .turn-indicator { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; background: #3d3d3d; }
        .active-turn { background: #4285f4; box-shadow: 0 0 15px #4285f4; }
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .player-log { background: #3d3d3d; padding: 10px; border-radius: 8px; font-size: 13px; max-height: 250px; overflow-y: auto; }
        
        /* 設定位數的區塊 */
        .settings-bar { background: #444; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; }
        select { background: #1a1a1a; color: white; border: 1px solid #666; padding: 5px; border-radius: 4px; }

        input { width: 100%; padding: 15px; background: #1a1a1a; border: 2px solid #444; border-radius: 8px; color: white; font-size: 20px; text-align: center; box-sizing: border-box; }
        input:focus { border-color: #4285f4; outline: none; }
        button { width: 100%; padding: 15px; background: #34a853; border: none; border-radius: 8px; color: white; font-size: 18px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        #endGameMenu { background: rgba(0, 0, 0, 0.9); border: 2px solid #555; border-radius: 12px; padding: 20px; text-align: center; margin-top: 20px; }
        #winnerMsg { font-size: 24px; color: #ffca28; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="game-card">
        <div id="turnBox" class="turn-indicator">載入中...</div>

        <div class="settings-bar">
            <span>遊戲位數：<strong id="digitDisplay">4</strong> 位</span>
            <div id="hostSettings" style="display:none;">
                <select id="digitSelect">
                    <option value="3">3 位</option>
                    <option value="4" selected>4 位</option>
                    <option value="5">5 位</option>
                    <option value="6">6 位</option>
                    <option value="7">7 位</option>
                    <option value="8">8 位</option>
                    <option value="9">9 位</option>
                    <option value="10">10 位</option>
                </select>
                <button id="applyDigitBtn" style="width:auto; padding:5px 10px; font-size:12px; margin:0; margin-left:5px;">套用</button>
            </div>
        </div>

        <input id="guess" type="text" placeholder="請輸入數字">
        <button id="submitBtn">送出猜測</button>
        
        <div class="history-grid" id="history"></div>

        <div id="endGameMenu" style="display:none;">
            <h3 style="color: #ffca28;">遊戲結束！</h3>
            <div id="winnerMsg"></div>
            <div id="hostEndControls" style="display:none;">
                <button onclick="resetWithCurrentDigits()" style="background: #34a853;">再戰一場</button>
                <button onclick="if(confirm('確定解散？')) roomRef.remove()" style="background: #d93025;">解散房間</button>
            </div>
            <button onclick="leaveRoom()" style="background: #666; margin-top: 10px;">回大廳</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const rid = params.get('roomId'), user = params.get('username');
        const roomRef = db.ref(`rooms/${rid}`);
        let currentDigitCount = 4;

        roomRef.on('value', snap => {
            const data = snap.val();
            if (!data) { location.href = '/index.html'; return; }

            // 更新當前位數設定
            currentDigitCount = data.gameData.digitCount || 4;
            document.getElementById('digitDisplay').innerText = currentDigitCount;
            document.getElementById('guess').maxLength = currentDigitCount;
            document.getElementById('guess').placeholder = `輸入 ${currentDigitCount} 位不重複數字`;

            // 房主權限顯示
            if (data.host === user) {
                document.getElementById('hostSettings').style.display = 'block';
                document.getElementById('hostEndControls').style.display = 'block';
            }

            // 狀態判定
            if (data.status === 'finished') {
                document.getElementById('endGameMenu').style.display = 'block';
                document.getElementById('winnerMsg').innerText = `🏆 贏家：${data.winner}\n答案是：${data.gameData.secret}`;
                document.getElementById('submitBtn').disabled = true;
            } else {
                document.getElementById('endGameMenu').style.display = 'none';
                const nowUser = data.turnOrder[data.currentTurnIndex];
                const isMe = nowUser === user;
                const tBox = document.getElementById('turnBox');
                tBox.innerText = isMe ? "⭐ 輪到你了！" : `等待 ${nowUser}...`;
                tBox.className = isMe ? "turn-indicator active-turn" : "turn-indicator";
                document.getElementById('submitBtn').disabled = !isMe;
            }

            // 渲染歷史
            const hist = document.getElementById('history'); hist.innerHTML = '';
            data.turnOrder.forEach(p => {
                const logs = data.players[p] || {};
                const div = document.createElement('div'); div.className = 'player-log';
                div.innerHTML = `<strong>${p}</strong><hr style="border:#555 1px solid">`;
                Object.keys(logs).forEach(k => { 
                    if(k!=='joined') div.innerHTML += `<div>${logs[k].guess} → ${logs[k].result}</div>`; 
                });
                hist.appendChild(div);
            });
        });

        // 房主修改位數
        document.getElementById('applyDigitBtn').onclick = () => {
            const newDigit = parseInt(document.getElementById('digitSelect').value);
            if(confirm(`修改為 ${newDigit} 位數將會重置當前對局，確定嗎？`)) {
                resetGameWithDigits(newDigit);
            }
        };

        function resetWithCurrentDigits() {
            resetGameWithDigits(currentDigitCount);
        }

        function resetGameWithDigits(digitCount) {
            roomRef.once('value').then(snap => {
                const data = snap.val();
                const playerList = data.turnOrder;
                
                // 產生新位數謎底
                let n = []; 
                while(n.length < digitCount){ 
                    let r = Math.floor(Math.random() * 10).toString(); 
                    if(!n.includes(r)) n.push(r); 
                }
                const newSecret = n.join('');

                const resetPlayers = {};
                playerList.forEach(p => { resetPlayers[p] = { joined: true }; });

                roomRef.update({
                    status: 'playing',
                    winner: null,
                    currentTurnIndex: 0,
                    gameData: { secret: newSecret, digitCount: digitCount },
                    players: resetPlayers
                });
            });
        }

        document.getElementById('submitBtn').onclick = () => {
            const val = document.getElementById('guess').value;
            if(val.length !== currentDigitCount || new Set(val).size !== currentDigitCount) {
                return alert(`請輸入 ${currentDigitCount} 位不重複數字`);
            }
            
            roomRef.once('value').then(s => {
                const d = s.val();
                const res = calc(d.gameData.secret, val);
                const up = {};
                up[`players/${user}/${Date.now()}`] = { guess:val, result:res };
                
                if(res === `${currentDigitCount}A0B`) { 
                    up.status = 'finished'; 
                    up.winner = user; 
                } else { 
                    up.currentTurnIndex = (d.currentTurnIndex + 1) % d.turnOrder.length; 
                }
                roomRef.update(up);
                document.getElementById('guess').value = '';
            });
        };

        function calc(s, g) {
            let a=0, b=0;
            for(let i=0; i<s.length; i++) { 
                if(g[i]===s[i]) a++; 
                else if(s.includes(g[i])) b++; 
            }
            return `${a}A${b}B`;
        }

        function leaveRoom() {
            if(confirm("確定離開？")) {
                roomRef.once('value').then(snap => {
                    const data = snap.val();
                    if (!data) { location.href = '/index.html'; return; }
                    if (data.host === user) {
                        roomRef.remove().then(() => location.href = '/index.html');
                    } else {
                        const newOrder = data.turnOrder.filter(p => p !== user);
                        roomRef.update({
                            [`players/${user}`]: null,
                            turnOrder: newOrder,
                            currentTurnIndex: 0 
                        }).then(() => location.href = '/index.html');
                    }
                });
            }
        }
    </script>
</body>
</html>
