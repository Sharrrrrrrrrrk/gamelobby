<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四子棋 RWD 連線版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="../firebase.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            margin: 0;
            min-height: 100vh;
        }

        .game-card { 
            background: #1e1e1e; 
            border-radius: 20px; 
            padding: 15px; 
            width: 100%; 
            max-width: 500px; /* 電腦端最大寬度 */
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            box-sizing: border-box;
        }
        
        /* 響應式棋盤容器 */
        #board-wrapper {
            background: #2563eb; 
            padding: 2%; /* 使用百分比間距 */
            border-radius: 12px;
            border: 4px solid #1e40af;
            margin: 15px auto;
            width: 95%; /* 手機端自動撐開 */
            box-sizing: border-box;
            display: block;
        }

        #board { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            grid-gap: 5px; /* 縮小間距適應小螢幕 */
            width: 100%;
        }

        .cell { 
            aspect-ratio: 1 / 1; /* 確保格子永遠是正圓形 */
            background: #121212; 
            border-radius: 50%;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer;
            box-shadow: inset 2px 2px 6px rgba(0,0,0,0.8);
            position: relative;
        }

        /* 棋子 RWD */
        .piece { 
            width: 85%; 
            height: 85%; 
            border-radius: 50%; 
            z-index: 2;
            /* 掉落動畫優化：從容器上方掉入 */
            animation: fall 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .piece.player1 { background: radial-gradient(circle at 30% 30%, #ff6b6b, #b91c1c); box-shadow: 0 3px #801010; }
        .piece.player2 { background: radial-gradient(circle at 30% 30%, #fde047, #ca8a04); box-shadow: 0 3px #8a6503; }

        @keyframes fall {
            0% { transform: translateY(-400%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .last-move-marker {
            width: 25%;
            height: 25%;
            background: white;
            border-radius: 50%;
            position: absolute;
            z-index: 3;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .turn-indicator { 
            text-align: center; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            font-weight: bold; 
            background: #2d2d2d;
            font-size: 1rem;
        }
        .active-turn { 
            background: #4285f4; 
            color: white;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4); 
        }
        
        /* 按鈕優化 */
        .menu-overlay {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }

        /* 防止手機點擊時出現藍色框 */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

<div class="game-card">
    <div id="turnBox" class="turn-indicator">載入中...</div>
    
    <div id="board-wrapper">
        <div id="board"></div>
    </div>

    <div id="endGameMenu" class="menu-overlay" style="display:none;">
        <h3 style="color: #ffca28; margin-top: 0;">Game Over</h3>
        <div id="winnerMsg" style="font-size: 1.2rem; margin-bottom: 20px;"></div>
        <div id="hostEndControls" style="display:none;">
            <button id="restartBtn" style="background: #10b981; margin-bottom: 10px;">重新開始 (房主)</button>
            <button id="closeRoomBtn" style="background: #ef4444; margin-bottom: 10px;">解散房間</button>
        </div>
        <button onclick="location.href='/index.html'" style="background: #4b5563;">返回大廳</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const rid = params.get('roomId'), user = params.get('username');
    const roomRef = db.ref(`rooms/${rid}`);

    const COLS = 7;
    const ROWS = 6;
    const initBoard = Array(COLS * ROWS).fill(0);
    let previousBoard = Array(COLS * ROWS).fill(0);

    roomRef.on('value', snap => {
        const data = snap.val();
        if (!data) return location.href = '/index.html';

        const myColor = data.turnOrder.indexOf(user) === 0 ? 1 : 2; 
        const isMyTurn = (data.turnOrder[data.currentTurnIndex] === user);
        
        const tBox = document.getElementById('turnBox');
        tBox.innerText = isMyTurn ? `⭐ 你的回合 (${myColor===1?'紅':'黃'})` : `等待對手落子...`;
        tBox.className = isMyTurn ? "turn-indicator active-turn" : "turn-indicator";

        renderBoard(data.board || initBoard, isMyTurn, myColor, data.lastMove);

        if (data.status === 'finished') {
            document.getElementById('endGameMenu').style.display = 'block';
            document.getElementById('winnerMsg').innerText = data.winner;
            if (data.host === user) document.getElementById('hostEndControls').style.display = 'block';
        } else {
            document.getElementById('endGameMenu').style.display = 'none';
        }
    });

    function renderBoard(boardData, isMyTurn, myColor, lastMove) {
        const boardEl = document.getElementById('board');
        
        if (boardEl.children.length === 0) {
            boardData.forEach((_, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.id = `cell-${i}`;
                boardEl.appendChild(div);
            });
        }

        boardData.forEach((cell, i) => {
            const cellDiv = document.getElementById(`cell-${i}`);
            cellDiv.onclick = isMyTurn ? () => handleMove(i % COLS, myColor, boardData) : null;

            if (cell !== previousBoard[i]) {
                cellDiv.innerHTML = ''; 
                if (cell !== 0) {
                    const p = document.createElement('div');
                    const isNewest = (i === lastMove);
                    p.className = `piece ${cell === 1 ? 'player1' : 'player2'}`;
                    if (!isNewest) p.style.animation = 'none';
                    cellDiv.appendChild(p);
                }
            }

            const oldMarker = cellDiv.querySelector('.last-move-marker');
            if (oldMarker) oldMarker.remove();
            
            if (cell !== 0 && i === lastMove) {
                const marker = document.createElement('div');
                marker.className = 'last-move-marker';
                cellDiv.appendChild(marker);
            }
        });
        previousBoard = [...boardData];
    }

    function handleMove(col, color, board) {
        let targetIdx = -1;
        for (let r = ROWS - 1; r >= 0; r--) {
            let idx = r * COLS + col;
            if (board[idx] === 0) { targetIdx = idx; break; }
        }
        if (targetIdx === -1) return;

        let newBoard = [...board];
        newBoard[targetIdx] = color;

        if (checkWin(targetIdx, color, newBoard)) {
            const msg = `🏆 ${color === 1 ? '紅色' : '黃色'} 獲勝！`;
            roomRef.update({ board: newBoard, status: 'finished', winner: msg, lastMove: targetIdx });
        } else {
            roomRef.once('value').then(snap => {
                const d = snap.val();
                roomRef.update({
                    board: newBoard,
                    currentTurnIndex: (d.currentTurnIndex + 1) % 2,
                    lastMove: targetIdx
                });
            });
        }
    }

    function checkWin(idx, color, board) {
        const r = Math.floor(idx / COLS), c = idx % COLS;
        const directions = [[1,0], [0,1], [1,1], [1,-1]];
        for (let [dr, dc] of directions) {
            let count = 1;
            count += countLine(r, c, dr, dc, color, board);
            count += countLine(r, c, -dr, -dc, color, board);
            if (count >= 4) return true;
        }
        return false;
    }

    function countLine(r, c, dr, dc, color, board) {
        let n = 0, nr = r + dr, nc = c + dc;
        while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr * COLS + nc] === color) {
            n++; nr += dr; nc += dc;
        }
        return n;
    }

    document.getElementById('restartBtn').onclick = () => {
        previousBoard = Array(COLS * ROWS).fill(0);
        roomRef.update({ status: 'playing', board: initBoard, currentTurnIndex: 0, winner: null, lastMove: null });
    };

    document.getElementById('closeRoomBtn').onclick = () => {
        if(confirm("確定解散房間？")) roomRef.remove();
    };
</script>
</body>
</html>
