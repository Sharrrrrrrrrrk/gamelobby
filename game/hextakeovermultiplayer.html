<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>六角占地 - 連線對戰模式</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="../firebase.js"></script>
<style>
    body { margin:0; background:#1a1a1a; color:white; font-family:'Segoe UI',sans-serif; display:flex; height:100vh; overflow: hidden; }
    
    /* 側邊欄基礎樣式 */
    #sidebar { 
        width:260px; 
        background:#2d2d2d; 
        padding:20px; 
        display:flex; 
        flex-direction:column; 
        gap:15px; 
        box-shadow:2px 0 15px rgba(0,0,0,0.5); 
        z-index: 100; /* 提高層級 */
        transition: transform 0.3s ease; 
        box-sizing: border-box;
        position: relative;
    }

    #main { flex:1; display:flex; justify-content:center; align-items:center; position:relative; background: radial-gradient(circle, #252525 0%, #1a1a1a 100%); touch-action: none; overflow: hidden; }
    canvas { max-width:95%; max-height:95%; border-radius:15px; cursor:pointer; }
    
    h3 { margin: 0; color: #00bcd4; font-size: 18px; }
    .control-group { background: #3d3d3d; padding: 12px; border-radius: 10px; }
    label { display: block; font-size: 13px; margin-bottom: 5px; color: #ccc; }
    
    button { padding:10px; cursor:pointer; background:#1a73e8; color:white; border:none; border-radius:8px; font-weight:bold; transition:0.2s; flex-shrink: 0; }
    button:hover { background:#1557b0; transform:translateY(-2px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .status { font-size:18px; margin:10px 0; min-height:60px; line-height: 1.5; }
    
    /* 遊戲結束選單 */
    #endGameMenu { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.95); border: 2px solid #555; border-radius: 12px; 
        padding: 30px; text-align: center; z-index: 150; min-width: 250px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    
    .secondary-btn { background: #555; margin-top: 5px; }

    /* 圖例自動推到底部 */
    .legend { 
        font-size:12px; color:#aaa; line-height: 1.8; 
        border-top: 1px solid #444; padding-top: 10px; 
        margin-top: auto; 
    }
    .dot { height:10px; width:10px; border-radius:50%; display:inline-block; margin-right: 8px; }

    /* 修正後的切換按鈕樣式 */
    .toggle-btn {
        position: absolute; 
        right: -45px; /* 關鍵：讓按鈕探頭 */
        top: 20px;
        width: 45px; 
        height: 40px; 
        display: none;
        background: #2d2d2d; 
        color: #00bcd4; 
        border: 1px solid #444;
        border-left: none;
        border-radius: 0 8px 8px 0; 
        cursor: pointer; 
        font-size: 20px;
        z-index: 101;
        box-shadow: 3px 0 10px rgba(0,0,0,0.3);
    }

    #overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6); display: none; z-index: 15;
    }

    @media (max-width: 768px) {
        #sidebar { 
            position: fixed; left: 0; top: 0; 
            height: 100%; transform: translateX(-100%); 
            overflow: visible; /* 允許按鈕溢出顯示 */
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        #sidebar.active { transform: translateX(0); }
        .toggle-btn { display: block; }
        #sidebar.active + #main #overlay { display: block; }
        #main { width: 100vw; }
    }
</style>
</head>
<body>

<div id="sidebar">
    <button id="toggleBtn" class="toggle-btn">☰</button>
    <h3>⬢ 六角占地 (連線)</h3>
    <p id="welcomeMsg" style="font-size: 12px; color: #888;">載入中...</p>

    <div class="control-group" id="hostOnlyControls" style="display:none;">
        <label>棋盤半徑: <span id="sizeValue">3</span></label>
        <input type="range" id="sizeRange" min="2" max="6" value="3" style="width:100%">
        <label style="margin-top:10px">障礙物: <span id="obstacleValue">3</span></label>
        <input type="range" id="obstacleRange" min="0" max="15" value="3" style="width:100%">
        <button id="resetBtn" style="width:100%; margin-top:10px; background:#34a853">🔄 重新初始化</button>
        <button id="dissolveBtn" style="width:100%; margin-top:10px; background:#d93025; font-size: 12px;">解散房間</button>
    </div>

    <div id="status" class="status">等待玩家...</div>

    <div class="legend">
        <div><span class="dot" style="background: rgba(0, 255, 0, 0.5);"></span>複製 (距離 1)</div>
        <div><span class="dot" style="background: rgba(255, 255, 0, 0.5);"></span>跳躍 (距離 2)</div>
        <div><span class="dot" style="background: rgba(128,128,128,0.8);"></span>障礙物</div>
    </div>

    <button class="secondary-btn" onclick="goBack()" style="width: 100%;">🏠 回到大廳</button>
</div>

<div id="main">
    <div id="overlay" onclick="toggleSidebar()"></div>
    
    <div id="endGameMenu" style="display:none;">
        <h3 style="color: #ffca28; font-size: 24px;">遊戲結束！</h3>
        <div id="winnerDisplay" style="margin: 15px 0; font-size: 18px;"></div>
        <div id="hostEndControls" style="display:none;">
            <button id="rematchBtn" style="background: #34a853; width: 100%; margin-bottom: 10px;">再戰一場</button>
        </div>
        <button onclick="goBack()" style="background: #666; width: 100%;">回大廳</button>
    </div>

    <canvas id="gameCanvas" width="800" height="800"></canvas>
</div>

<script>
// --- 原有連線邏輯保持不變 ---
const params = new URLSearchParams(location.search);
const rid = params.get('roomId'), username = params.get('username') || "玩家";
const roomRef = db.ref(`rooms/${rid}`);

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('toggleBtn');

let grid = [], hexSize, selectedHex=null, hoveredHex=null;
let myColor = 0, currentData = null;

// --- UI 切換邏輯 ---
function toggleSidebar() {
    sidebar.classList.toggle('active');
    toggleBtn.innerText = sidebar.classList.contains('active') ? '✕' : '☰';
}

function autoCloseSidebar() {
    if (window.innerWidth <= 768) {
        sidebar.classList.remove('active');
        toggleBtn.innerText = '☰';
    }
}

// 修正點擊事件
toggleBtn.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    toggleSidebar();
};

// --- Firebase 監聽 ---
roomRef.on('value', snap => {
    const data = snap.val();
    if (!data) { 
        alert("房間已解散");
        location.href = '/index.html'; 
        return; 
    }
    
    currentData = data;
    grid = data.board || [];
    
    myColor = data.turnOrder.indexOf(username) === 0 ? 1 : 2;
    const isMe = data.turnOrder[data.currentTurnIndex] === username;

    document.getElementById('welcomeMsg').innerText = `玩家：${username} (${myColor===1?'藍方':'紅方'})`;

    if (data.host === username) {
        document.getElementById('hostOnlyControls').style.display = 'block';
        document.getElementById('hostEndControls').style.display = 'block';
    }

    if (data.status === 'finished') {
        document.getElementById('endGameMenu').style.display = 'block';
        document.getElementById('winnerDisplay').innerHTML = `<b style="color:#ffca28">${data.winner}</b>`;
    } else {
        document.getElementById('endGameMenu').style.display = 'none';
        updateStatusDisplay(data, isMe);
    }

    if (data.host === username && (!data.board || data.board.length === 0)) {
        initGameData();
    }
});

function updateStatusDisplay(data, isMe) {
    const blue = grid.filter(h=>h.owner===1).length;
    const red = grid.filter(h=>h.owner===2).length;
    const turnOrderColor = data.currentTurnIndex === 0 ? "#00e5ff" : "#ff5252";
    
    document.getElementById('status').innerHTML = `
        <span style="color:#00e5ff">藍: ${blue}</span> | <span style="color:#ff5252">紅: ${red}</span><br>
        <small style="color:${turnOrderColor}">${isMe ? '⭐ 輪到你了' : '⌛ 等待對方...'}</small>
    `;
    canvas.style.boxShadow = turnOrderColor + "33 0px 0px 30px";
}

function initGameData() {
    const radius = parseInt(document.getElementById('sizeRange').value);
    const obsCount = parseInt(document.getElementById('obstacleRange').value);
    let newGrid = [];
    
    for(let q=-radius; q<=radius; q++){
        for(let r=Math.max(-radius,-q-radius); r<=Math.min(radius,-q+radius); r++){
            newGrid.push({ q, r, owner: 0, type: 'normal', scale: 1 });
        }
    }
    
    const set = (q,r,o) => { const h = newGrid.find(x=>x.q===q && x.r===r); if(h) h.owner=o; };
    set(0,-radius,1); set(-radius,radius,1);
    set(0,radius,2); set(radius,-radius,2);
    
    let emptyOnes = newGrid.filter(h => h.owner === 0);
    for(let i=0; i<obsCount && emptyOnes.length>0; i++){
        const idx = Math.floor(Math.random()*emptyOnes.length);
        emptyOnes[idx].type = 'obstacle';
        emptyOnes.splice(idx,1);
    }
    
    roomRef.update({ board: newGrid, currentTurnIndex: 0, status: 'playing', winner: null });
}

function movePiece(from, to) {
    const newGrid = JSON.parse(JSON.stringify(grid));
    const d = getDistance(from, to);
    const target = newGrid.find(h => h.q === to.q && h.r === to.r);
    
    if(d === 2) {
        const source = newGrid.find(h => h.q === from.q && h.r === from.r);
        source.owner = 0;
    }
    
    target.owner = myColor;
    target.scale = 0.5;

    newGrid.forEach(h => {
        if(getDistance(target, h) === 1 && h.owner !== 0 && h.owner !== myColor) {
            h.owner = myColor;
            h.scale = 0.8;
        }
    });

    selectedHex = null;
    autoCloseSidebar();
    checkTurnEnd(newGrid);
}

function checkTurnEnd(newGrid) {
    const blueCount = newGrid.filter(h => h.owner === 1).length;
    const redCount = newGrid.filter(h => h.owner === 2).length;
    
    const hasMoves = (player) => newGrid.some(start => 
        start.owner === player && newGrid.some(end => 
            end.owner === 0 && end.type === 'normal' && getDistance(start, end) <= 2
        )
    );

    let nextIdx = (currentData.currentTurnIndex + 1) % 2;
    let nextPlayerMoves = hasMoves(nextIdx === 0 ? 1 : 2);

    if (blueCount === 0 || redCount === 0 || (!hasMoves(1) && !hasMoves(2))) {
        let winnerText = blueCount > redCount ? "藍方勝利！" : (redCount > blueCount ? "紅方勝利！" : "雙方平手！");
        roomRef.update({ board: newGrid, status: 'finished', winner: winnerText });
    } else if (!nextPlayerMoves) {
        roomRef.update({ board: newGrid, currentTurnIndex: currentData.currentTurnIndex });
    } else {
        roomRef.update({ board: newGrid, currentTurnIndex: nextIdx });
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (!grid.length) { requestAnimationFrame(draw); return; }
    
    const radius = Math.max(...grid.map(h=>Math.abs(h.q)));
    hexSize = Math.min(canvas.width*0.9/(radius*3+1.5), canvas.height*0.9/((radius*2+1)*Math.sqrt(3)));
    
    grid.forEach(h => {
        const p = getHexPos(h.q, h.r, hexSize);
        const px = canvas.width/2 + p.x, py = canvas.height/2 + p.y;
        
        h.scale = h.scale || 1;
        h.scale += (1 - h.scale) * 0.12;

        ctx.beginPath();
        for(let i=0;i<6;i++) ctx.lineTo(px + hexSize*0.9*h.scale*Math.cos(Math.PI/3*i), py + hexSize*0.9*h.scale*Math.sin(Math.PI/3*i));
        ctx.closePath();
        
        let fill = '#333';
        if(h.type==='obstacle') fill = '#555';
        else if(h.owner===1) fill = '#00e5ff';
        else if(h.owner===2) fill = '#ff5252';
        
        if(selectedHex && h.owner === 0 && h.type === 'normal'){
            const d = getDistance(selectedHex, h);
            if(d === 1) fill = "rgba(0, 255, 0, 0.25)";
            else if(d === 2) fill = "rgba(255, 255, 0, 0.25)";
        }

        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = (hoveredHex === h) ? '#fff' : '#444';
        ctx.lineWidth = (hoveredHex === h) ? 2 : 1;
        ctx.stroke();

        if(selectedHex === h) { ctx.strokeStyle = 'yellow'; ctx.lineWidth = 3; ctx.stroke(); }
    });
    requestAnimationFrame(draw);
}

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    hoveredHex = null;
    grid.forEach(h => {
        const p = getHexPos(h.q, h.r, hexSize);
        if(Math.hypot(canvas.width/2 + p.x - mx, canvas.height/2 + p.y - my) < hexSize * 0.8) hoveredHex = h;
    });
});

canvas.addEventListener('click', e => {
    if(!currentData || currentData.status !== 'playing') return;
    if(currentData.turnOrder[currentData.currentTurnIndex] !== username) return;
    if(sidebar.classList.contains('active')) return;
    if(!hoveredHex) return;

    if(hoveredHex.owner === myColor) {
        selectedHex = (selectedHex === hoveredHex) ? null : hoveredHex;
    } else if(selectedHex && hoveredHex.owner === 0 && hoveredHex.type === 'normal') {
        const d = getDistance(selectedHex, hoveredHex);
        if(d <= 2) movePiece(selectedHex, hoveredHex);
    }
});

function getHexPos(q, r, size) {
    return { x: size * 1.5 * q, y: size * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) };
}

function getDistance(h1, h2) {
    return (Math.abs(h1.q - h2.q) + Math.abs(h1.q + h1.r - h2.q - h2.r) + Math.abs(h1.r - h2.r)) / 2;
}

function goBack() {
    if(confirm("確定離開房間？")) {
        roomRef.once('value').then(snap => {
            const data = snap.val();
            if (!data) return location.href = '/index.html';
            if (data.host === username) {
                roomRef.remove().then(() => location.href = '/index.html');
            } else {
                const newOrder = data.turnOrder.filter(p => p !== username);
                roomRef.update({
                    [`players/${username}`]: null,
                    turnOrder: newOrder,
                    currentTurnIndex: 0
                }).then(() => location.href = '/index.html');
            }
        });
    }
}

document.getElementById('sizeRange').oninput = (e) => document.getElementById('sizeValue').innerText = e.target.value;
document.getElementById('obstacleRange').oninput = (e) => document.getElementById('obstacleValue').innerText = e.target.value;
document.getElementById('dissolveBtn').onclick = () => confirm('確定解散？') && roomRef.remove();
document.getElementById('rematchBtn').onclick = () => initGameData();
document.getElementById('resetBtn').onclick = () => initGameData();

function resetHeight(){
    document.body.style.height = window.innerHeight + "px";
    sidebar.style.height = window.innerHeight + "px";
}
window.addEventListener('resize', resetHeight);
resetHeight();

draw();
</script>
</body>
</html>
