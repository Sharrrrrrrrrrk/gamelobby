<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等候室</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        .room-id { font-size: 32px; font-weight: bold; color: #1a73e8; letter-spacing: 5px; margin: 20px 0; }
        .player-tag { display: inline-block; background: #e8f0fe; color: #1967d2; padding: 5px 15px; border-radius: 20px; margin: 5px; font-size: 14px; }
        .start-btn { background: #34a853; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>等待玩家加入...</h2>
        <div class="room-id" id="ridDisp">-</div>
        <div id="playerList"></div>
        <div id="hostZone" style="display:none;">
            <button class="start-btn" onclick="start()">開始遊戲</button>
        </div>
        <p id="waitNote" style="color:#666; margin-top:20px;">等待房主啟動遊戲</p>
    </div>

    <script>
    const params = new URLSearchParams(location.search);
    const rid = params.get('roomId');
    const user = params.get('username');
    
    // --- 關鍵修正：定義 roomRef ---
    const roomRef = db.ref(`rooms/${rid}`);
    
    document.getElementById('ridDisp').innerText = rid;

    // 監聽房間狀態
    roomRef.on('value', snap => {
        const data = snap.val();
        if(!data) return;

        // 自動跳轉邏輯
        if (data.status === 'playing') {
            // 停止監聽，避免重複觸發跳轉
            roomRef.off(); 
            
            let targetPage = '';
            switch (data.gameType) {
                case 'Hextakeover':
                    // 請確認你的檔案名稱是 hextakeover.html 還是 hex.html
                    targetPage = '/game/hextakeover.html'; 
                    break;
                case 'hextakeovermultiplayer':
                    targetPage = '/game/hextakeovermultiplayer.html';
                    break;
                case 'Othello':
                    targetPage = '/game/Othello.html';
                    break;
                case 'ConnectFour':
                    targetPage = '/game/ConnectFour.html';
                    break;
                case 'Gomoku':
                    targetPage = '/game/Gomoku.html';
                    break;
                case '1a2b':
                default:
                    targetPage = '/game/1a2b.html';
                    break;
            }
    
            location.href = `${targetPage}?roomId=${rid}&username=${encodeURIComponent(user)}`;
            return;
        }
        
        // 更新玩家列表
        if (data.turnOrder) {
            document.getElementById('playerList').innerHTML = data.turnOrder.map(p => `<span class="player-tag">${p}</span>`).join('');
        }

        // 房主權限控管
        if(data.host === user) {
            document.getElementById('hostZone').style.display = 'block';
            document.getElementById('waitNote').style.display = 'none';
        }
    });

    function start() {
        roomRef.once('value').then(snap => {
            const data = snap.val();
            if(!data) return;

            const updates = { 
                status: 'playing',
                lastActive: Date.now()
            };
    
            switch (data.gameType) {
                case '1a2b':
                    let n = []; 
                    while(n.length < 4) { 
                        let r = Math.floor(Math.random() * 10).toString(); 
                        if(!n.includes(r)) n.push(r); 
                    }
                    updates['gameData'] = { 
                        secret: n.join(''),
                        startTime: Date.now()
                    };
                    break;
    
                case 'Hextakeover':
                    updates['gameData'] = { mode: 'single-player-practice' };
                    break;
                case 'hextakeovermultiplayer':
                    updates['gameData'] = { mode: 'multiplayer' };  
                    break;

                case 'Othello':
                    // 初始化棋盤資料：0空, 1黑, 2白
                    const initBoard = Array(64).fill(0);
                    initBoard[27] = 2; initBoard[28] = 1; initBoard[35] = 1; initBoard[36] = 2;
                    updates['board'] = initBoard;
                    break;

                case 'ConnectFour':
                    // 初始化棋盤資料：0空, 1紅, 2黃
                    updates['board'] = Array(42).fill(0);
                    break;

                case 'Gomoku':
                // 初始化棋盤資料：0空, 1黑, 2白    
                updates['board'] = Array(225).fill(0);
                break;
    
                default:
                    console.error("未知的遊戲類型:", data.gameType);
                    return alert("遊戲類型錯誤，無法開始");
            }
    
            roomRef.update(updates).catch(err => {
                console.error("更新失敗:", err);
                alert("啟動失敗，請檢查網路。");
            });
        });
    }
</script>
</body>
</html>
